version: 2

updates:
    # Python dependencies
    - package-ecosystem: "pip"
      directory: "/"
      target-branch: "develop"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:00"
      open-pull-requests-limit: 10
      groups:
          python-dependencies:
              patterns:
                  - "*"
      commit-message:
          prefix: "chore"
          include: "scope"

    # GitHub Actions
    - package-ecosystem: "github-actions"
      directory: "/"
      target-branch: "develop"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:00"
      open-pull-requests-limit: 5
      groups:
          github-actions-dependencies:
              patterns:
                  - "*"
      labels:
          - "dependencies"
          - "github-actions"
      commit-message:
          prefix: "chore"
          include: "scope"
