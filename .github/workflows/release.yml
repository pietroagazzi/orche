name: Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

jobs:
    release:
        name: Build & Publish Release
        runs-on: ubuntu-latest
        environment:
            name: pypi
            url: https://pypi.org/project/orche/
        permissions:
            id-token: write
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - name: Build package
              run: uv build

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              with:
                  files: dist/*
                  draft: false
                  prerelease: false
